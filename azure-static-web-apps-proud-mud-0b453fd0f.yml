name: Azure Static Web Apps CI/CD

pr:
  branches:
    include:
      - master
trigger:
  branches:
    include:
      - master

jobs:
- job: build_and_deploy_job
  displayName: Build and Deploy Job
  condition: or(eq(variables['Build.Reason'], 'Manual'),or(eq(variables['Build.Reason'], 'PullRequest'),eq(variables['Build.Reason'], 'IndividualCI')))
  pool:
    vmImage: ubuntu-latest
  variables:
  - group: Azure-Static-Web-Apps-proud-mud-0b453fd0f-variable-group
  steps:
  - checkout: self
    submodules: false
  - task: AzureStaticWebApp@0
    inputs:
      azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_PROUD_MUD_0B453FD0F)
###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
# For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
      app_location: "/" # App source code path
      api_location: "" # Api source code path - optional
      app_build_command: 'hugo --gc --minify && test -s docs/search/index.html && grep -q "search-form" docs/search/index.html && test -s docs/search/index.json && python3 -c "import json; json.load(open(\"docs/search/index.json\", encoding=\"utf-8\"))"' # Force Hugo build from content and fail if search artifacts are missing/invalid
      output_location: "docs" # Built app content directory - optional
    env:
      HUGO_VERSION: '0.128.2'  # Compatible with ubuntu-latest GLIBC; Stack theme modified for compatibility
###### End of Repository/Build Configurations ######

