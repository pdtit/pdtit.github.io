baseURL = "https://www.007ffflearning.com"
title = "Azure Readiness starts here..."
theme = "stack"
publishDir = "docs"
languageCode = "en-us"
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

# Needed for theme
hasCJKLanguage = false
defaultContentLanguage = "en"

[outputs]
home = ["HTML", "RSS", "JSON"]

[params]
  mainSections = ["post"]
  featuredImageField = "image"
  rssFullContent = true
  favicon = "/images/007ffflearning-ape.png"

  # App Insights
  azureAppInsightsKey = "100a91c6-40e4-4e8e-a4ee-57873dc4eee3"

  [params.footer]
    since = 2021
    customText = "The best way to know the future, is to learn it"

  [params.dateFormat]
    published = "Jan 02, 2006"
    lastUpdated = "Jan 02, 2006 15:04 MST"

  [params.sidebar]
    emoji = "🎓"
    subtitle = "Bring me an audience, I'll give them Azure knowledge in return"
    avatar = "/images/007ffflearning-ape.png"

  [params.article]
    math = false
    toc = true
    readingTime = true
    license.enabled = false
    
  [params.comments]
    enabled = false

  [params.cookies]
    enabled = true

  [params.widgets]
    homepage = [
      { type = "tag-cloud", params = { showLink = true } },
      { type = "github-repos", params = { title = "My top 5 github repos", limit = 5, profileUrl = "https://github.com/petender" } }
    ]
    page = []

  [params.defaultImage.opengraph]
    enabled = false

  [params.colorScheme]
    toggle = true
    default = "auto"

# Main menu
[[menu.main]]
  identifier = "home"
  name = "Home"
  url = "/"
  weight = -100
  [menu.main.params]
    icon = "home"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/post/"
  weight = 10
  [menu.main.params]
    icon = "archives"

[[menu.main]]
  identifier = "books"
  name = "Books"
  url = "/books/"
  weight = 20
  [menu.main.params]
    icon = "book-open"

[[menu.main]]
  identifier = "speaking"
  name = "Speaking"
  url = "/speaking/"
  weight = 25
  [menu.main.params]
    icon = "microphone"

[[menu.main]]
  identifier = "about"
  name = "About Me"
  url = "/about/"
  weight = 30
  [menu.main.params]
    icon = "user"

# Social links
[[menu.social]]
  identifier = "bluesky"
  name = "Bluesky"
  url = "https://pdtit.bsky.social"
  [menu.social.params]
    icon = "bluesky"

[[menu.social]]
  identifier = "linkedin"
  name = "LinkedIn"
  url = "https://www.linkedin.com/in/pdtit/"

[[menu.social]]
  identifier = "github"
  name = "GitHub"
  url = "https://github.com/petender"
  [menu.social.params]
    icon = "brand-github"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    ordered = true
    startLevel = 2
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNoStart = 1
    lineNos = true
    lineNumbersInTable = true
    tabWidth = 4
