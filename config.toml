baseURL = "https://www.007ffflearning.com"
title = "Azure Readiness starts here..."
theme = "PaperMod"
publishDir = "docs"
languageCode = "en-us"
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[outputs]
home = ["HTML", "RSS", "JSON"]  # JSON for search

[params]
  env = "production"
  description = "The best way to know the future, is to learn it"
  author = "Peter De Tender"
  keywords = ["Azure", "Learning", "Certification", "Technology"]
  
  # PaperMod specific
  defaultTheme = "auto"  # auto, light, dark
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false
  
  # App Insights
  azureAppInsightsKey = "100a91c6-40e4-4e8e-a4ee-57873dc4eee3"
  
  # Custom colors
  [params.assets]
    theme_color = "#007FFF"

  # Home page info
  [params.homeInfoParams]
    Title = "Azure Readiness starts here..."
    Content = "Bring me an audience, I'll give them Azure knowledge in return"

  # Profile mode (alternative to homeInfo)
  [params.profileMode]
    enabled = false
    title = "Peter De Tender"
    subtitle = "The best way to know the future, is to learn it"
    imageUrl = "img/007ffflearning-ape.png"
    imageWidth = 120
    imageHeight = 120
    imageTitle = "007FFF Learning"
    
    [[params.profileMode.buttons]]
      name = "Posts"
      url = "/post/"
    [[params.profileMode.buttons]]
      name = "About"
      url = "/about/"

  # Social icons
  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/pdtit"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/pdtit/"
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/petender"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:info@007ffflearning.com"
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

# Main menu
[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/post/"
  weight = 10

[[menu.main]]
  identifier = "books"
  name = "Books"
  url = "/books/"
  weight = 20

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 30

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 40

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 50

# Markup settings
[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    lineNos = false
    noClasses = false
    style = "dracula"

  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

# Privacy settings (for analytics)
[privacy]
  [privacy.googleAnalytics]
    disable = true
